[versions]
disruptor = "3.4.4"
affinity = "3.23.3"
hdrhistogram = "2.2.1"
slf4j = "2.0.9"
logback = "1.4.12"
junit = "5.10.1"
java = "21"

[libraries]
disruptor = { group = "com.lmax", name = "disruptor", version.ref = "disruptor" }
affinity = { group = "net.openhft", name = "affinity", version.ref = "affinity" }
hdrhistogram = { group = "org.hdrhistogram", name = "HdrHistogram", version.ref = "hdrhistogram" }
slf4j-api = { group = "org.slf4j", name = "slf4j-api", version.ref = "slf4j" }
logback-classic = { group = "ch.qos.logback", name = "logback-classic", version.ref = "logback" }
junit-jupiter = { group = "org.junit.jupiter", name = "junit-jupiter", version.ref = "junit" }

[plugins]
application = { id = "application", version = "8.5" }
java-library = { id = "java-library", version = "8.5" }
shadow = { id = "com.github.johnrengelman.shadow", version = "8.1.1" }
